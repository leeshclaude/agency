<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="68%">
      <stop offset="0%" stop-color="#F2A7BE"/>
      <stop offset="100%" stop-color="#D4688A"/>
    </radialGradient>
    <radialGradient id="center" cx="40%" cy="38%" r="60%">
      <stop offset="0%" stop-color="#FAE8EF"/>
      <stop offset="100%" stop-color="#F2A7BE"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- 5 cherry blossom petals (white ellipses rotated around centre) -->
  <g transform="translate(256,256)">
    <ellipse cx="0" cy="-94" rx="48" ry="76" fill="white" fill-opacity="0.94" transform="rotate(0)"/>
    <ellipse cx="0" cy="-94" rx="48" ry="76" fill="white" fill-opacity="0.94" transform="rotate(72)"/>
    <ellipse cx="0" cy="-94" rx="48" ry="76" fill="white" fill-opacity="0.94" transform="rotate(144)"/>
    <ellipse cx="0" cy="-94" rx="48" ry="76" fill="white" fill-opacity="0.94" transform="rotate(216)"/>
    <ellipse cx="0" cy="-94" rx="48" ry="76" fill="white" fill-opacity="0.94" transform="rotate(288)"/>

    <!-- Petal notch lines (give each petal a soft crease) -->
    <line x1="0" y1="-170" x2="0" y2="-42" stroke="#F2A7BE" stroke-width="2.5" stroke-opacity="0.6" transform="rotate(0)"/>
    <line x1="0" y1="-170" x2="0" y2="-42" stroke="#F2A7BE" stroke-width="2.5" stroke-opacity="0.6" transform="rotate(72)"/>
    <line x1="0" y1="-170" x2="0" y2="-42" stroke="#F2A7BE" stroke-width="2.5" stroke-opacity="0.6" transform="rotate(144)"/>
    <line x1="0" y1="-170" x2="0" y2="-42" stroke="#F2A7BE" stroke-width="2.5" stroke-opacity="0.6" transform="rotate(216)"/>
    <line x1="0" y1="-170" x2="0" y2="-42" stroke="#F2A7BE" stroke-width="2.5" stroke-opacity="0.6" transform="rotate(288)"/>

    <!-- Centre disc (covers inner petal tips, creates visual separation) -->
    <circle cx="0" cy="0" r="44" fill="url(#center)"/>

    <!-- Small stamens -->
    <circle cx="0" cy="-22" r="5" fill="white" fill-opacity="0.85" transform="rotate(0)"/>
    <circle cx="0" cy="-22" r="5" fill="white" fill-opacity="0.85" transform="rotate(72)"/>
    <circle cx="0" cy="-22" r="5" fill="white" fill-opacity="0.85" transform="rotate(144)"/>
    <circle cx="0" cy="-22" r="5" fill="white" fill-opacity="0.85" transform="rotate(216)"/>
    <circle cx="0" cy="-22" r="5" fill="white" fill-opacity="0.85" transform="rotate(288)"/>

    <!-- Centre highlight -->
    <circle cx="-6" cy="-6" r="14" fill="white" fill-opacity="0.35"/>
  </g>
</svg>
